version: 2
updates:
  # Dependências npm — agrupadas em um único PR semanal
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    ignore:
      # ESLint 10 quebra o eslint-plugin-react embutido no eslint-config-next
      # (usa getFilename, removido no v10). Preso ao 9 até o Next suportar.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # TypeScript 7 quebra o typescript-eslint embutido no eslint-config-next
      # (erro "reading 'Cjs'") e o build da Vercel. Preso ao 6 até o Next suportar.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # Atualizações das próprias GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
