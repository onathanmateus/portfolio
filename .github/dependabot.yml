version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    ignore:
      # ESLint 10 é incompatível com o eslint-config-next atual.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # TypeScript 7 quebra o typescript-estree (lint) e o build do Next 16
      # ("typescript not installed"). Segurar o major até a toolchain suportar.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies"]
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
