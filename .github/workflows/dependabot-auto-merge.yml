name: Dependabot auto-merge

# Dispara quando o workflow de CI termina. Roda no contexto do branch padrão
# (não no do PR do Dependabot), então tem permissão de escrita para mergear.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Merge automático dos PRs do Dependabot
    runs-on: ubuntu-latest
    # Só prossegue se o CI passou, o autor é o Dependabot e o branch é dele.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    steps:
      - name: Localiza o PR do branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.event.workflow_run.head_branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - name: Faz squash merge e apaga o branch
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
