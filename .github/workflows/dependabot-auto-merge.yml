name: Dependabot auto-merge

# Quando o CI termina com sucesso num PR do Dependabot, aprova e faz squash-merge
# na main, apagando o branch em seguida. Se o CI falhar, nada é mergeado (o
# Dependabot refaz o PR na próxima). Assim tudo fica atualizado só na main, sem
# branches pendentes (inclusive na Vercel). Roda 100% sozinho.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Só age em PR do Dependabot cujo CI passou.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Aprovar e mergear o PR do Dependabot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          pr=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
                --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            echo "Nenhum PR aberto para o branch $BRANCH"
            exit 0
          fi
          echo "PR #$pr (branch $BRANCH)"
          # Aprova (opcional; se o repo não permitir, segue mesmo assim).
          gh pr review "$pr" --repo "$REPO" --approve \
            || echo "Aprovação automática não permitida — seguindo para o merge."
          # Squash-merge + apaga o branch.
          gh pr merge "$pr" --repo "$REPO" --squash --delete-branch
